<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Agendamento App</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .login-bg {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(17, 24, 39, 0.38), rgba(17, 24, 39, 0.38)),
        url("img/capa-whatsapp.jpg");
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="login-bg flex items-center justify-center p-4">
  <div class="p-8 rounded-xl shadow-2xl w-full max-w-md" style="background-color: rgba(255,255,255,0.94);">
    <img
      src="img/logo.png"
      alt="Logo Cerâmica Fortes"
      class="w-24 h-24 object-contain mx-auto mb-3"
    >
    <h1 class="text-2xl font-bold text-center mb-6">Agendamento</h1>
    <form id="login-form" class="space-y-4">
      <input id="login-email" type="email" placeholder="E-mail" required class="w-full border p-2 rounded">
      <input id="login-password" type="password" placeholder="Senha" required class="w-full border p-2 rounded">
      <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Entrar</button>
    </form>
    <p class="mt-6 text-sm text-gray-500 text-center">
      Acesso restrito a usuários cadastrados pela empresa.
    </p>
  </div>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
