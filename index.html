<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agendamento App</title>

  <!-- TailwindCSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales-all.global.min.js"></script>

  <!-- Estilos extras -->
  <style>
    body { background: #f3f4f6; }
    .sidebar { position: sticky; top: 0; height: 100vh; }
    #chart-reps, #chart-clis {
      height: 400px !important;
      max-height: 400px !important;
    }

    /* Tooltip customizado */
    .tooltip-custom {
      position: absolute;
      background: #1f2937; /* cinza escuro */
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25); /* sombra estilo Tailwind */
    }
    /* ===== AJUSTE DO CALENDÁRIO ===== */
.fc {
  width: 100% !important;
}

.fc .fc-daygrid-day-frame {
  min-height: 120px;
}

.fc-daygrid-event {
  white-space: normal !important;
  font-size: 11px;
}

.fc .fc-toolbar {
  flex-wrap: wrap;
}
  </style>
</head>
<body class="min-h-screen md:flex">
 

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-md p-4 transform -translate-x-full transition-transform duration-300 z-50 md:relative md:translate-x-0">
    <h2 class="text-xl font-bold mb-6">Menu</h2>
    <ul class="space-y-2">
      
<li data-perfil="all"><button data-page="dashboard" class="menu-item">Dashboard</button></li>
<li data-perfil="all"><button data-page="clientes" class="menu-item">Clientes</button></li>
<li data-perfil="all"><button data-page="pedidos" class="menu-item">Pedidos</button></li>
<li data-perfil="admin"><button data-page="produtos" class="menu-item">Produtos</button></li>
<li data-perfil="admin"><button data-page="agendamentos" class="menu-item">Agendamentos</button></li>
<li data-perfil="admin"><button data-page="relatorios" class="menu-item">Relatórios</button></li>
<li data-perfil="admin">button data-page="producao" class="menu-item">Produção</button></li>
<li data-perfil="admin"><button data-page="recibo" class="menu-item">Recibo</button></li>
<li><a href="#" onclick="renderNotas()" class="flex items-center space-x-2 hover:bg-yellow-100 p-2 rounded"><span>📝</span><span>Bloco de Anotações</span></a></li>

      </ul>
    <button id="logout-button" class="mt-6 w-full bg-red-600 text-white p-2 rounded">Sair</button>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6">
   <header class="mb-4 flex justify-between items-center">

  <!-- ESQUERDA -->
  <div>
    <button onclick="toggleMenu()" class="md:hidden mb-2 bg-blue-600 text-white px-3 py-2 rounded">
      ☰ Menu
    </button>

  </div>

  <!-- DIREITA (USUÁRIO) -->
  <div id="usuario-logado" class="text-sm font-semibold text-gray-700">
    Carregando usuário...
  </div>

</header>

  <h1 class="text-2xl font-bold">Dashboard</h1>
  <p class="text-sm text-gray-500">Use o menu à esquerda para navegar.</p>

    
</header>

    <!-- Conteúdo dinâmico -->
    <div id="page-content" class="space-y-4">
      <div class="bg-white p-6 rounded shadow">
        <h3 class="text-lg font-semibold mb-2">Bem-vindo</h3>
        <p>Selecione uma opção no menu para começar.</p>
      </div>
    </div>
  </main>

  <!-- Firebase (compat v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

  <!-- Extras -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="js/notas.js"></script>


  <!-- Seus scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/crud.js"></script>
  <script src="js/pedidos.js"></script>
  <script src="js/producao.js"></script>
  <script src="js/recibo.js"></script>
  <script>function toggleMenu() {const menu = document.getElementById("sidebar");menu.classList.toggle("-translate-x-full");}</script>
    
</body>
</html>
